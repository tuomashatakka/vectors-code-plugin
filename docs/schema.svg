<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 740" role="img" aria-labelledby="t d" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif">
  <title id="t">vectors unified knowledge database — schema</title>
  <desc id="d">Entity-relationship diagram. embedding_space is the registry hub; each row spawns a physical emb_* vector table. project is the content hub (self-referential parent_id, space_id to embedding_space, sources jsonb). project has documents, each document has chunks; project has sessions, each session has messages; project has memory_node rows (an L0–L3 abstraction ladder linked into a DAG by derivation) and learned fact rows. reference rows are global. link is a polymorphic edge table joining any rows. digest_job is the background work queue, daemon_state a KV store. intent and intent_resolution back the intent memory. Every embeddable row (chunk, message, memory_node, fact, reference) carries (space_id, embedding_id) into embedding_space.</desc>
  <defs>
    <marker id="ah" markerWidth="8" markerHeight="8" refX="6.2" refY="3.5" orient="auto" markerUnits="userSpaceOnUse">
      <path class="ah" d="M0,0 L7,3.5 L0,7 z"/>
    </marker>
  </defs>
  <style>
    :root{
      --card:#ffffff; --line:#dfe3ea; --ink:#161616; --muted:#6b6b6b;
      --acc:#2752e7; --accfill:#eef2fe; --accink:#1c3aa6; --bg:#ffffff;
    }
    @media (prefers-color-scheme: dark){
      :root{
        --card:#161616; --line:#2b2b2b; --ink:#ededed; --muted:#9a9a9a;
        --acc:#7aa2ff; --accfill:#16213e; --accink:#cdddff; --bg:#0e0e0e;
      }
    }
    .tb{ fill:var(--card); stroke:var(--line); stroke-width:1.5; }
    .hdr{ fill:var(--accfill); stroke:var(--acc); stroke-width:1.5; }
    .hub .hdr{ fill:var(--acc); }
    .tn{ fill:var(--accink); font-weight:700; font-size:12px; font-family:ui-monospace,Menlo,monospace; }
    .hub .tn{ fill:var(--bg); }
    .cl{ fill:var(--muted); font-size:10px; font-family:ui-monospace,Menlo,monospace; }
    .pk{ fill:var(--ink); font-weight:600; }
    .fk{ stroke:var(--acc); stroke-width:1.4; fill:none; }
    .fkd{ stroke:var(--acc); stroke-width:1.3; fill:none; stroke-dasharray:4 4; opacity:.8; }
    .lbl{ fill:var(--muted); font-size:9px; font-family:ui-monospace,Menlo,monospace; }
    .note{ fill:var(--muted); font-size:11px; }
    .hd{ fill:var(--muted); font-family:ui-monospace,Menlo,monospace; font-weight:700; font-size:11px; letter-spacing:.14em; }
    .ah{ fill:var(--acc); }
  </style>

  <text class="hd" x="40" y="30">UNIFIED KNOWLEDGE DATABASE · ENTITY-RELATIONSHIP</text>

  <!-- ============ embedding_space hub + physical table ============ -->
  <g class="hub">
    <rect class="tb" x="40" y="52" width="206" height="108"/>
    <rect class="hdr" x="40" y="52" width="206" height="22"/>
    <text class="tn" x="50" y="67">embedding_space</text>
    <text class="cl pk" x="50" y="90">• id</text>
    <text class="cl" x="50" y="106">model · dim · metric</text>
    <text class="cl" x="50" y="122">table_name</text>
    <text class="cl" x="50" y="146">registry hub →</text>
  </g>
  <rect class="tb" x="40" y="184" width="206" height="92"/>
  <rect class="hdr" x="40" y="184" width="206" height="22"/>
  <text class="tn" x="50" y="199">emb_minilm_384  (+ dynamic)</text>
  <text class="cl pk" x="50" y="222">• embedding_id</text>
  <text class="cl" x="50" y="238">→ space_id</text>
  <text class="cl" x="50" y="254">content_hash · embedding</text>
  <line class="fk" x1="143" y1="184" x2="143" y2="162" marker-end="url(#ah)"/>

  <!-- ============ project content hub ============ -->
  <g class="hub">
    <rect class="tb" x="300" y="52" width="220" height="124"/>
    <rect class="hdr" x="300" y="52" width="220" height="22"/>
    <text class="tn" x="310" y="67">project</text>
    <text class="cl pk" x="310" y="90">• id</text>
    <text class="cl" x="310" y="106">name (unique)</text>
    <text class="cl" x="310" y="122">↺ parent_id → project</text>
    <text class="cl" x="310" y="138">→ space_id · root_path</text>
    <text class="cl" x="310" y="162">sources jsonb</text>
  </g>
  <!-- project.space_id -> embedding_space -->
  <line class="fk" x1="300" y1="100" x2="246" y2="100" marker-end="url(#ah)"/>
  <text class="lbl" x="252" y="94">space_id</text>
  <!-- self loop -->
  <path class="fk" d="M520,128 C548,128 548,108 522,108" marker-end="url(#ah)"/>

  <!-- ============ document -> chunk ============ -->
  <rect class="tb" x="580" y="52" width="200" height="82"/>
  <rect class="hdr" x="580" y="52" width="200" height="22"/>
  <text class="tn" x="590" y="67">document</text>
  <text class="cl pk" x="590" y="90">• id</text>
  <text class="cl" x="590" y="106">→ project_id · rel_path</text>
  <text class="cl" x="590" y="122">content · content_hash</text>
  <line class="fk" x1="520" y1="92" x2="577" y2="92" marker-end="url(#ah)"/>
  <text class="lbl" x="528" y="86">project_id</text>

  <rect class="tb" x="580" y="170" width="200" height="116"/>
  <rect class="hdr" x="580" y="170" width="200" height="22"/>
  <text class="tn" x="590" y="185">chunk</text>
  <text class="cl pk" x="590" y="208">• id</text>
  <text class="cl" x="590" y="224">→ document_id · project_id</text>
  <text class="cl" x="590" y="240">ordinal · unit_type · symbol</text>
  <text class="cl" x="590" y="256">→ space_id · embedding_id</text>
  <text class="cl" x="590" y="272">text · url · content_hash</text>
  <line class="fk" x1="680" y1="134" x2="680" y2="167" marker-end="url(#ah)"/>
  <text class="lbl" x="688" y="155">document_id</text>

  <!-- ============ session -> message ============ -->
  <rect class="tb" x="300" y="220" width="220" height="66"/>
  <rect class="hdr" x="300" y="220" width="220" height="22"/>
  <text class="tn" x="310" y="235">session</text>
  <text class="cl pk" x="310" y="258">• id</text>
  <text class="cl" x="310" y="274">→ project_id · title</text>
  <line class="fk" x1="380" y1="176" x2="380" y2="217" marker-end="url(#ah)"/>

  <rect class="tb" x="300" y="320" width="220" height="92"/>
  <rect class="hdr" x="300" y="320" width="220" height="22"/>
  <text class="tn" x="310" y="335">message</text>
  <text class="cl pk" x="310" y="358">• id</text>
  <text class="cl" x="310" y="374">→ session_id · project_id</text>
  <text class="cl" x="310" y="390">role · seq · text</text>
  <text class="cl" x="310" y="406">→ embedding_id</text>
  <line class="fk" x1="410" y1="286" x2="410" y2="317" marker-end="url(#ah)"/>

  <!-- ============ memory_node + derivation ============ -->
  <rect class="tb" x="40" y="320" width="206" height="108"/>
  <rect class="hdr" x="40" y="320" width="206" height="22"/>
  <text class="tn" x="50" y="335">memory_node</text>
  <text class="cl pk" x="50" y="358">• id</text>
  <text class="cl" x="50" y="374">→ project_id · level L0–L3</text>
  <text class="cl" x="50" y="390">anchor_kind/id · summary</text>
  <text class="cl" x="50" y="406">→ embedding_id · is_stale</text>
  <line class="fk" x1="300" y1="120" x2="248" y2="360" marker-end="url(#ah)"/>
  <text class="lbl" x="120" y="300">project_id</text>

  <rect class="tb" x="40" y="452" width="206" height="64"/>
  <rect class="hdr" x="40" y="452" width="206" height="22"/>
  <text class="tn" x="50" y="467">derivation  (DAG)</text>
  <text class="cl" x="50" y="490">↺ parent_id → memory_node</text>
  <text class="cl" x="50" y="506">↺ child_id → memory_node</text>
  <line class="fk" x1="143" y1="452" x2="143" y2="430" marker-end="url(#ah)"/>

  <!-- ============ fact ============ -->
  <rect class="tb" x="300" y="448" width="220" height="92"/>
  <rect class="hdr" x="300" y="448" width="220" height="22"/>
  <text class="tn" x="310" y="463">fact</text>
  <text class="cl pk" x="310" y="486">• id</text>
  <text class="cl" x="310" y="502">→ project_id · statement</text>
  <text class="cl" x="310" y="518">confidence · salience · status</text>
  <text class="cl" x="310" y="534">→ embedding_id</text>
  <path class="fk" d="M410,412 L410,445" marker-end="url(#ah)"/>

  <!-- ============ reference (global) + link (polymorphic) ============ -->
  <rect class="tb" x="820" y="52" width="160" height="92"/>
  <rect class="hdr" x="820" y="52" width="160" height="22"/>
  <text class="tn" x="830" y="67">reference</text>
  <text class="cl pk" x="830" y="90">• id (global)</text>
  <text class="cl" x="830" y="106">kind · uri</text>
  <text class="cl" x="830" y="122">content_hash</text>
  <text class="cl" x="830" y="138">→ embedding_id</text>

  <rect class="tb" x="820" y="184" width="160" height="100"/>
  <rect class="hdr" x="820" y="184" width="160" height="22"/>
  <text class="tn" x="830" y="199">link  (edge)</text>
  <text class="cl pk" x="830" y="222">• id</text>
  <text class="cl" x="830" y="238">src_kind · src_id</text>
  <text class="cl" x="830" y="254">dst_kind · dst_id</text>
  <text class="cl" x="830" y="270">relation · project_id</text>
  <!-- polymorphic dashed links -->
  <line class="fkd" x1="820" y1="220" x2="780" y2="228"/>
  <line class="fkd" x1="900" y1="184" x2="900" y2="144"/>
  <text class="lbl" x="744" y="300">polymorphic edges join any rows</text>

  <!-- ============ background: digest_job, daemon_state ============ -->
  <rect class="tb" x="820" y="330" width="160" height="92"/>
  <rect class="hdr" x="820" y="330" width="160" height="22"/>
  <text class="tn" x="830" y="345">digest_job  (queue)</text>
  <text class="cl pk" x="830" y="368">• id</text>
  <text class="cl" x="830" y="384">task · payload</text>
  <text class="cl" x="830" y="400">state · dedupe_key</text>
  <text class="cl" x="830" y="416">attempts · lease_until</text>

  <rect class="tb" x="820" y="450" width="160" height="58"/>
  <rect class="hdr" x="820" y="450" width="160" height="22"/>
  <text class="tn" x="830" y="465">daemon_state</text>
  <text class="cl pk" x="830" y="488">• key</text>
  <text class="cl" x="830" y="504">value jsonb</text>

  <!-- ============ intent + intent_resolution ============ -->
  <rect class="tb" x="580" y="330" width="200" height="84"/>
  <rect class="hdr" x="580" y="330" width="200" height="22"/>
  <text class="tn" x="590" y="345">intent</text>
  <text class="cl pk" x="590" y="368">• id</text>
  <text class="cl" x="590" y="384">normalized · intent_text</text>
  <text class="cl" x="590" y="400">project · frequency</text>

  <rect class="tb" x="580" y="446" width="200" height="84"/>
  <rect class="hdr" x="580" y="446" width="200" height="22"/>
  <text class="tn" x="590" y="461">intent_resolution</text>
  <text class="cl pk" x="590" y="484">• id</text>
  <text class="cl" x="590" y="500">→ intent_id · outcome</text>
  <text class="cl" x="590" y="516">score · grader</text>
  <line class="fk" x1="680" y1="414" x2="680" y2="443" marker-end="url(#ah)"/>

  <!-- ============ shared embedding note ============ -->
  <text class="note" x="40" y="588">All embeddable rows — chunk · message · memory_node · fact · reference — carry (space_id, embedding_id) → embedding_space.</text>
  <text class="note" x="40" y="610">Deletes cascade from project to document/chunk/memory_node; sessions &amp; facts null out. Vectors dedupe per space by content_hash.</text>
</svg>

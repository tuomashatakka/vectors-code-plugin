<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>vector-index · synapse viewer</title>
<style>
  :root {
    --bg:#070809; --panel:#0b0d12; --line:#1c2130; --line-2:#252b3a;
    --fg:#dde1e9; --dim:#6b7384; --faint:#3e4556;
    --accent:#6eb5e8; --hot:#e0556a;
    --u-section:#6b96e8; --u-symbol:#a87fe8; --u-definition:#6eb5e8;
    --u-code:#8ec45a; --u-text:#8899b0;
    --r:3px;
  }
  * { box-sizing:border-box; margin:0; }
  html,body { height:100%; background:var(--bg); color:var(--fg); overflow:hidden;
    font:12.5px/1.5 ui-monospace,"SF Mono",Menlo,monospace;
    -webkit-font-smoothing:antialiased; }
  canvas#c { position:fixed; inset:0; width:100%; height:100%; display:block; touch-action:none; }

  .panel { position:fixed; z-index:10; background:var(--panel);
    border:1px solid var(--line-2); border-radius:var(--r); }

  #brand { top:16px; left:16px; padding:10px 14px; }
  #brand h1 { font-size:10.5px; letter-spacing:.22em; text-transform:uppercase;
    color:var(--dim); font-weight:600; display:flex; align-items:center; gap:7px; }
  #brand h1::before { content:""; width:6px; height:6px; border-radius:50%;
    background:var(--accent); animation:beat 2.6s ease-in-out infinite; }
  #brand .meta { color:var(--faint); margin-top:5px; font-size:11px; }
  #brand .meta b { color:var(--fg); font-weight:600; }
  @keyframes beat { 0%,100%{opacity:.35} 50%{opacity:1} }

  #searchbar { top:16px; left:50%; transform:translateX(-50%);
    display:flex; gap:0; padding:4px; width:min(46ch,72vw); }
  #q { flex:1; background:transparent; border:0; color:var(--fg);
    padding:7px 11px; outline:none; font:inherit; }
  #q::placeholder { color:var(--faint); }
  #go { background:#0f1118; border:1px solid var(--line-2); color:var(--accent); border-radius:2px;
    padding:7px 14px; cursor:pointer; font:inherit; transition:background .12s,color .12s,border-color .12s; }
  #go:hover { background:var(--accent); color:var(--bg); border-color:var(--accent); }
  #searchbar.busy #go { opacity:.5; pointer-events:none; }
  #count { position:absolute; top:-22px; left:0; color:var(--dim); font-size:11px;
    opacity:0; transition:opacity .25s; }
  #count.show { opacity:1; }

  #detail { top:96px; left:16px; width:min(34ch,86vw); max-height:calc(100vh - 150px);
    display:none; flex-direction:column; overflow:hidden; opacity:0;
    transform:translateY(6px); transition:opacity .22s, transform .22s; }
  #detail.show { display:flex; opacity:1; transform:none; }
  #detail .head { padding:12px 14px 10px; border-bottom:1px solid var(--line); }
  #detail .body { padding:12px 14px; overflow-y:auto; overflow-x:hidden; }
  #detail .body::-webkit-scrollbar { width:4px; }
  #detail .body::-webkit-scrollbar-thumb { background:var(--line-2); border-radius:2px; }

  .d-title { color:var(--fg); font-weight:600; font-size:12.5px; line-height:1.35;
    word-break:break-word; }
  .badges { display:flex; flex-wrap:wrap; gap:4px; margin-top:8px; }
  .badge { font-size:10px; letter-spacing:.04em; padding:2px 7px; border-radius:2px;
    border:1px solid var(--line-2); color:var(--dim); white-space:nowrap; }
  .badge.kind { color:var(--bg); font-weight:700; border:0; }
  .badge .dot { display:inline-block; width:5px; height:5px; border-radius:50%; margin-right:5px;
    vertical-align:middle; }

  .sec { margin-top:14px; }
  .sec:first-child { margin-top:0; }
  .sec h2 { font-size:9.5px; letter-spacing:.18em; text-transform:uppercase;
    color:var(--faint); font-weight:600; margin-bottom:6px; display:flex; gap:6px; align-items:center; }
  .sec h2 .n { color:var(--dim); }

  .loc { color:var(--dim); font-size:11px; word-break:break-all; }
  .loc b { color:var(--accent); font-weight:500; }

  pre.text { white-space:pre-wrap; word-break:break-word; color:#b8bcc8; font-size:11.5px;
    line-height:1.55; max-height:200px; overflow-y:auto; padding:8px 10px; border-radius:2px;
    background:#080a0e; border:1px solid var(--line); }
  pre.text::-webkit-scrollbar { width:4px; } pre.text::-webkit-scrollbar-thumb { background:var(--line-2); }
  mark { background:transparent; color:var(--hot); border-radius:2px; padding:0 1px;
    animation:flare 1.1s ease-out; font-weight:600; }
  @keyframes flare {
    0% { background:rgba(224,85,106,.8); color:#fff; }
    100% { background:transparent; } }

  .row { display:flex; align-items:flex-start; gap:8px; padding:5px 6px; border-radius:2px;
    cursor:pointer; transition:background .1s; border:1px solid transparent; }
  .row:hover { background:rgba(110,181,232,.07); border-color:var(--line); }
  .row.self { background:rgba(224,85,106,.08); border-color:rgba(224,85,106,.22); cursor:default; }
  .row .dot { flex:none; width:6px; height:6px; border-radius:50%; margin-top:4px; }
  .row .lab { flex:1; min-width:0; }
  .row .lab .l1 { color:var(--fg); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .row .lab .l2 { color:var(--faint); font-size:10.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .row .sc { flex:none; color:var(--dim); font-size:10px; padding-top:2px; }

  .refs { display:flex; flex-direction:column; gap:4px; }
  .ref { display:flex; gap:7px; align-items:center; font-size:11px; }
  .ref .k { font-size:9px; text-transform:uppercase; letter-spacing:.06em; color:var(--faint);
    border:1px solid var(--line-2); border-radius:2px; padding:1px 5px; flex:none; }
  .ref a, .ref span.uri { color:var(--accent); word-break:break-all; text-decoration:none; }
  .ref a:hover { text-decoration:underline; }

  #legend { bottom:16px; left:16px; padding:9px 12px; display:flex; gap:12px; flex-wrap:wrap; }
  #legend .it { display:flex; align-items:center; gap:5px; color:var(--dim); font-size:10.5px; }
  #legend .it .dot { width:6px; height:6px; border-radius:50%; }

  #hint { bottom:16px; right:16px; padding:8px 12px; color:var(--faint); text-align:right;
    font-size:10.5px; max-width:40ch; }
  #hint kbd { color:var(--dim); border:1px solid var(--line-2); border-radius:2px;
    padding:0 4px; font:inherit; }

  #brand .switch { margin-top:7px; color:var(--accent); cursor:pointer; font-size:10.5px; display:none; }
  #brand .switch:hover { text-decoration:underline; }

  #picker { position:fixed; inset:0; z-index:30; display:none; align-items:center; justify-content:center;
    background:rgba(4,5,7,.82); backdrop-filter:blur(3px); }
  #picker.show { display:flex; }
  #picker .card { width:min(40ch,86vw); max-height:70vh; overflow:auto; padding:14px;
    background:var(--panel); border:1px solid var(--line-2); border-radius:var(--r); }
  #picker h2 { font-size:10.5px; letter-spacing:.2em; text-transform:uppercase; color:var(--dim);
    font-weight:600; margin-bottom:10px; }
  #picker .pj { display:flex; justify-content:space-between; align-items:center; gap:10px;
    padding:9px 11px; border:1px solid var(--line); border-radius:2px; margin-bottom:6px; cursor:pointer;
    transition:background .1s,border-color .1s; }
  #picker .pj:hover { background:rgba(110,181,232,.08); border-color:var(--accent); }
  #picker .pj .nm { color:var(--fg); font-weight:600; }
  #picker .pj .st { color:var(--faint); font-size:10.5px; }

  #inventory { top:96px; right:16px; width:min(38ch,86vw); max-height:calc(100vh - 150px);
    display:none; flex-direction:column; overflow:hidden; opacity:0;
    transform:translateY(6px); transition:opacity .22s, transform .22s; }
  #inventory.show { display:flex; opacity:1; transform:none; }
  #inventory .head { padding:12px 14px 10px; border-bottom:1px solid var(--line); }
  #inventory .body { padding:12px 14px; overflow-y:auto; overflow-x:hidden; }
  #inventory .body::-webkit-scrollbar { width:4px; }
  #inventory .body::-webkit-scrollbar-thumb { background:var(--line-2); border-radius:2px; }
  #inventory .kids { margin-left:13px; border-left:1px solid var(--line); padding-left:6px; }
  #inventory .more { margin-top:8px; width:100%; background:#0f1118; border:1px solid var(--line-2);
    color:var(--accent); border-radius:2px; padding:6px; cursor:pointer; font:inherit; font-size:10.5px; }
  #inventory .more:hover { background:var(--accent); color:var(--bg); border-color:var(--accent); }
  #datatoggle { display:block; }
  #stale { display:none; color:var(--hot); }

  .sec h2 .open { margin-left:auto; color:var(--accent); cursor:pointer;
    letter-spacing:0; text-transform:none; font-weight:500; }
  .sec h2 .open:hover { text-decoration:underline; }
  .row .op { flex:none; color:var(--faint); cursor:pointer; padding:0 3px; font-size:11px; }
  .row .op:hover { color:var(--accent); }

  #feed { position:fixed; right:16px; bottom:56px; z-index:12; display:flex;
    flex-direction:column-reverse; gap:6px; align-items:flex-end; pointer-events:none;
    max-width:46ch; }
  #feed .ev { background:var(--panel); border:1px solid var(--line-2);
    border-left:2px solid var(--accent); border-radius:var(--r); padding:6px 10px;
    font-size:10.5px; color:var(--dim); opacity:0; transform:translateY(4px);
    transition:opacity .25s, transform .25s; white-space:nowrap; overflow:hidden;
    text-overflow:ellipsis; max-width:100%; }
  #feed .ev.in { opacity:1; transform:none; }
  #feed .ev.out { opacity:0; }
  #feed .ev b { color:var(--fg); font-weight:600; }

  #docview { position:fixed; inset:0; z-index:40; display:none; align-items:center;
    justify-content:center; background:rgba(4,5,7,.86); backdrop-filter:blur(4px); }
  #docview.show { display:flex; }
  #docview .card { width:min(96ch,92vw); max-height:86vh; display:flex;
    flex-direction:column; background:var(--panel); border:1px solid var(--line-2);
    border-radius:var(--r); overflow:hidden; }
  #docview .head { padding:12px 16px; border-bottom:1px solid var(--line);
    display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  #docview .head .ttl { font-weight:600; word-break:break-all; }
  #docview .head .x { margin-left:auto; cursor:pointer; color:var(--dim);
    border:1px solid var(--line-2); border-radius:2px; padding:1px 8px; flex:none; }
  #docview .head .x:hover { color:var(--fg); border-color:var(--accent); }
  #docview .bd { padding:14px 16px; overflow:auto; }
  #docview .bd::-webkit-scrollbar { width:4px; }
  #docview .bd::-webkit-scrollbar-thumb { background:var(--line-2); border-radius:2px; }
  #docview pre.full { white-space:pre-wrap; word-break:break-word; color:#b8bcc8;
    font-size:11.5px; line-height:1.6; }

  @media (max-width:640px){ #legend,#hint,#feed{display:none} #detail,#inventory{width:86vw} }
</style>
</head>
<body>
<canvas id="c"></canvas>

<aside id="brand" class="panel">
  <h1>synapse viewer</h1>
  <div class="meta" id="meta">loading…</div>
  <div class="switch" id="switch">▾ switch project</div>
  <div class="switch" id="datatoggle">▸ data</div>
  <div class="switch" id="stale">↻ data changed — refresh</div>
</aside>

<div id="searchbar" class="panel">
  <span id="count"></span>
  <input id="q" placeholder="semantic search…" autocomplete="off" spellcheck="false" />
  <button id="go">search</button>
</div>

<section id="detail" class="panel">
  <header class="head">
    <div class="d-title" id="d-title"></div>
    <div class="badges" id="d-badges"></div>
  </header>
  <div class="body" id="d-body"></div>
</section>

<section id="inventory" class="panel">
  <header class="head">
    <div class="d-title" id="i-title">data</div>
    <div class="badges" id="i-badges"></div>
  </header>
  <div class="body" id="i-body"></div>
</section>

<footer id="legend" class="panel"></footer>
<div id="hint" class="panel">
  <kbd>drag</kbd> orbit · <kbd>wheel</kbd> zoom · <kbd>click</kbd> inspect ·
  <kbd>↑↓←→</kbd> traverse relations · <kbd>d</kbd> data ·
  <kbd>esc</kbd> / empty click clear
</div>

<div id="picker"><div class="card"><h2>choose a project</h2><div id="picker-list"></div></div></div>

<div id="feed"></div>

<div id="docview"><div class="card">
  <div class="head">
    <span class="ttl" id="dv-title"></span>
    <span class="badges" id="dv-badges"></span>
    <span class="x" id="dv-close">esc</span>
  </div>
  <div class="bd" id="dv-body"></div>
</div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
"use strict";
const API = location.origin;
const cv  = document.getElementById('c');

// ---- unit-type palette (shared JS + CSS) ---------------------------------
const UNIT_COLORS = {
  section:'#6b96e8', symbol:'#a87fe8', definition:'#6eb5e8',
  code:'#8ec45a', text:'#8899b0', '':'#8899b0',
};
const HOT = '#e0556a';
const colorOf = ut => UNIT_COLORS[ut] ?? UNIT_COLORS[''];

// deterministic per-project hue (containers, labels, activity feed)
function projColor(name){ let h=0; const s=String(name||'');
  for(let i=0;i<s.length;i++) h=(h*31+s.charCodeAt(i))>>>0;
  return 'hsl('+(h%360)+',52%,60%)'; }

// ---- renderer / scene ----------------------------------------------------
const renderer = new THREE.WebGLRenderer({canvas:cv, antialias:true, alpha:false});
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x070809, 0.052);
const camera = new THREE.PerspectiveCamera(55, 1, 0.1, 300);

// soft round glow texture (for the focus halo sprite)
function glowTex(){
  const s=128, cvs=document.createElement('canvas'); cvs.width=cvs.height=s;
  const g=cvs.getContext('2d'); const rg=g.createRadialGradient(s/2,s/2,0,s/2,s/2,s/2);
  rg.addColorStop(0,'rgba(255,255,255,1)'); rg.addColorStop(.25,'rgba(255,255,255,.5)');
  rg.addColorStop(1,'rgba(255,255,255,0)'); g.fillStyle=rg; g.fillRect(0,0,s,s);
  const t=new THREE.CanvasTexture(cvs); t.needsUpdate=true; return t;
}
const halo = new THREE.Sprite(new THREE.SpriteMaterial({
  map:glowTex(), color:new THREE.Color(HOT), transparent:true, opacity:0,
  blending:THREE.AdditiveBlending, depthWrite:false, depthTest:false }));
halo.scale.setScalar(0); scene.add(halo);

// ---- glow-point shader (per-node size + alpha, round soft disc) ----------
const nodeMat = new THREE.ShaderMaterial({
  uniforms:{ uPx:{value:Math.min(devicePixelRatio,2)}, uScale:{value:320.0} },
  vertexColors:true, transparent:true, depthWrite:false,
  blending:THREE.AdditiveBlending,
  vertexShader:`
    attribute float aSize; attribute float aAlpha;
    varying vec3 vCol; varying float vA;
    uniform float uPx; uniform float uScale;
    void main(){
      vCol=color; vA=aAlpha;
      vec4 mv=modelViewMatrix*vec4(position,1.0);
      gl_PointSize=aSize*uScale*uPx/max(0.001,-mv.z);
      gl_Position=projectionMatrix*mv;
    }`,
  fragmentShader:`
    varying vec3 vCol; varying float vA;
    void main(){
      vec2 uv=gl_PointCoord-0.5; float d=length(uv);
      if(d>0.5) discard;
      float disc=smoothstep(0.50,0.33,d);
      float core=smoothstep(0.20,0.0,d);
      vec3 col=vCol*(0.78+0.46*core)+core*0.26;
      gl_FragColor=vec4(col, disc*vA);
    }`,
});

// ---- orbit (eased) -------------------------------------------------------
let radius=15, theta=0.6, phi=1.05;
let rTarget=15, thTarget=0.6, phiTarget=1.05;
const target=new THREE.Vector3(), targetGoal=new THREE.Vector3();
const _cp=new THREE.Vector3();
function applyCam(){
  _cp.set(target.x+radius*Math.sin(phi)*Math.cos(theta),
          target.y+radius*Math.cos(phi),
          target.z+radius*Math.sin(phi)*Math.sin(theta));
  camera.position.copy(_cp); camera.lookAt(target);
}
let drag=false, px=0, py=0, downX=0, downY=0;
cv.addEventListener('pointerdown', e=>{ drag=true; px=downX=e.clientX; py=downY=e.clientY;
  AUTOSPIN=false; cv.setPointerCapture(e.pointerId); });
cv.addEventListener('pointerup',   e=>{ drag=false; try{cv.releasePointerCapture(e.pointerId)}catch(_){}});
cv.addEventListener('pointercancel',()=>drag=false);
cv.addEventListener('pointermove', e=>{ if(!drag) return;
  thTarget -= (e.clientX-px)*0.005;
  phiTarget = Math.max(0.18, Math.min(2.96, phiTarget-(e.clientY-py)*0.005));
  px=e.clientX; py=e.clientY; });
cv.addEventListener('wheel', e=>{ e.preventDefault();
  rTarget = Math.max(3.5, Math.min(90, rTarget*(1+Math.sign(e.deltaY)*0.09))); }, {passive:false});

// ---- graph state ---------------------------------------------------------
let nodes=[], pts=null, lines=null, focusLines=null, focus=-1, adjacency={}, idById={};
let aPos, aCol, aSize, aAlpha, sizeT, alphaT, popV, baseCol, hitSet=null, hitWeights=null;
let MODE='server', AUTOSPIN=false;
let containers=[], containerByProj={};
const _c = new THREE.Color();

function disposeMesh(m){ if(m){ scene.remove(m); m.geometry.dispose(); } }

// ---- per-project container meshes (all-projects scope) --------------------
function labelSprite(text, color){
  const fs=26, pad=10;
  const meas=document.createElement('canvas').getContext('2d');
  meas.font='600 '+fs+'px ui-monospace,Menlo,monospace';
  const w=Math.ceil(meas.measureText(text).width)+pad*2, h=fs+pad*2;
  const cvs=document.createElement('canvas'); cvs.width=w*2; cvs.height=h*2;
  const g=cvs.getContext('2d'); g.scale(2,2);
  g.font='600 '+fs+'px ui-monospace,Menlo,monospace';
  g.fillStyle=color; g.textBaseline='middle'; g.fillText(text,pad,h/2);
  const t=new THREE.CanvasTexture(cvs); t.needsUpdate=true;
  const sp=new THREE.Sprite(new THREE.SpriteMaterial({
    map:t, transparent:true, opacity:0.5, depthWrite:false }));
  sp.scale.set(w/26, h/26, 1);
  return sp;
}
function disposeContainers(){
  containers.forEach(c=>{
    scene.remove(c.mesh); scene.remove(c.wire); scene.remove(c.label);
    c.mesh.geometry.dispose(); c.mesh.material.dispose();
    c.wire.geometry.dispose(); c.wire.material.dispose();
    c.label.material.map.dispose(); c.label.material.dispose();
  });
  containers=[]; containerByProj={};
}
// One subtle translucent shell + wireframe + label per project cluster; only
//  drawn when the graph spans more than one project (the ⁂ all scope).
function buildContainers(){
  disposeContainers();
  const groups={};
  nodes.forEach((n,i)=>{ if(n.project) (groups[n.project]=groups[n.project]||[]).push(i); });
  const names=Object.keys(groups);
  if(names.length<2) return;
  names.forEach(name=>{
    const idx=groups[name], c=[0,0,0];
    idx.forEach(i=>{ c[0]+=nodes[i].p[0]; c[1]+=nodes[i].p[1]; c[2]+=nodes[i].p[2]; });
    c[0]/=idx.length; c[1]/=idx.length; c[2]/=idx.length;
    let r=0; idx.forEach(i=>{ const p=nodes[i].p;
      r=Math.max(r, Math.hypot(p[0]-c[0],p[1]-c[1],p[2]-c[2])); });
    r=Math.max(r+0.9, 1.6);
    const col=new THREE.Color(projColor(name));
    const mesh=new THREE.Mesh(new THREE.SphereGeometry(r, 28, 18),
      new THREE.MeshBasicMaterial({color:col, transparent:true, opacity:0.045,
        side:THREE.BackSide, depthWrite:false}));
    const wire=new THREE.Mesh(new THREE.SphereGeometry(r, 18, 12),
      new THREE.MeshBasicMaterial({color:col, wireframe:true, transparent:true,
        opacity:0.05, depthWrite:false, blending:THREE.AdditiveBlending}));
    mesh.position.set(...c); wire.position.set(...c);
    const label=labelSprite(name, projColor(name));
    label.position.set(c[0], c[1]+r+0.9, c[2]);
    scene.add(mesh); scene.add(wire); scene.add(label);
    const entry={name, mesh, wire, label, flash:0};
    containers.push(entry); containerByProj[name]=entry;
  });
}
function flashProject(name){ const c=containerByProj[name]; if(c) c.flash=1; }

function renderGraph(g){
  disposeMesh(pts); disposeMesh(lines); disposeMesh(focusLines);
  nodes=g.nodes||[]; adjacency={}; idById={}; hitSet=null; hitWeights=null; focus=-1;
  const N=nodes.length;
  aPos=new Float32Array(N*3); aCol=new Float32Array(N*3);
  aSize=new Float32Array(N); aAlpha=new Float32Array(N);
  sizeT=new Float32Array(N); alphaT=new Float32Array(N);
  popV=new Float32Array(N); baseCol=new Float32Array(N*3);
  nodes.forEach((n,i)=>{
    aPos[i*3]=n.p[0]; aPos[i*3+1]=n.p[1]; aPos[i*3+2]=n.p[2];
    _c.set(colorOf(n.unit_type)); _c.toArray(baseCol,i*3); _c.toArray(aCol,i*3);
    aSize[i]=sizeT[i]=1.0; aAlpha[i]=alphaT[i]=0.92; idById[n.id]=i;
  });
  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(aPos,3));
  geo.setAttribute('color',    new THREE.BufferAttribute(aCol,3));
  geo.setAttribute('aSize',    new THREE.BufferAttribute(aSize,1));
  geo.setAttribute('aAlpha',   new THREE.BufferAttribute(aAlpha,1));
  pts=new THREE.Points(geo, nodeMat); pts.frustumCulled=false; scene.add(pts);

  // links — vertex colors fade by similarity weight
  const lp=[], lc=[];
  (g.links||[]).forEach(([a,b,w])=>{
    if(a>=N||b>=N) return;
    (adjacency[a]=adjacency[a]||[]).push(b); (adjacency[b]=adjacency[b]||[]).push(a);
    const wn=Math.max(0.12, Math.min(1,(w||0.4)));
    for(const k of [a,b]){
      lp.push(nodes[k].p[0],nodes[k].p[1],nodes[k].p[2]);
      _c.set(colorOf(nodes[k].unit_type)).multiplyScalar(0.34*wn+0.06);
      lc.push(_c.r,_c.g,_c.b);
    }
  });
  const lgeo=new THREE.BufferGeometry();
  lgeo.setAttribute('position', new THREE.Float32BufferAttribute(lp,3));
  lgeo.setAttribute('color',    new THREE.Float32BufferAttribute(lc,3));
  lines=new THREE.LineSegments(lgeo, new THREE.LineBasicMaterial(
    {vertexColors:true, transparent:true, opacity:0.6, depthWrite:false,
     blending:THREE.AdditiveBlending}));
  lines.frustumCulled=false; scene.add(lines);

  // focused-node edge overlay — preallocated for the max degree, redrawn on focus change
  let maxDeg=1; for(const key in adjacency) maxDeg=Math.max(maxDeg, adjacency[key].length);
  const fgeo=new THREE.BufferGeometry();
  fgeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(maxDeg*2*3),3));
  fgeo.setDrawRange(0,0);
  focusLines=new THREE.LineSegments(fgeo, new THREE.LineBasicMaterial(
    {color:HOT, transparent:true, opacity:0.9, depthWrite:false,
     blending:THREE.AdditiveBlending}));
  focusLines.visible=false; focusLines.frustumCulled=false; scene.add(focusLines);

  // project containers + wider framing when the cloud spans multiple clusters
  buildContainers();
  const ext=nodes.reduce((m,n)=>Math.max(m,Math.abs(n.p[0]),Math.abs(n.p[1]),Math.abs(n.p[2])),1);
  scene.fog.density = ext>9 ? 0.016 : 0.052;
  if(ext>9) rTarget=Math.min(84, ext*2.3);
  restyle();
}

// compute per-node style targets from focus + search hits
function restyle(){
  if(!pts) return;
  const N=nodes.length, hot=hitSet && hitSet.size>0;
  for(let i=0;i<N;i++){
    let size=1.0, alpha=0.92; _c.fromArray(baseCol,i*3);
    if(hot){
      if(hitSet.has(i)){ const w=hitWeights&&hitWeights.has(i)?hitWeights.get(i):0.7;
        size=1.3+1.3*w; alpha=1.0; _c.lerp(new THREE.Color(1,1,1),0.10+0.15*w); }
      else { size=0.72; alpha=0.20; _c.multiplyScalar(0.6); }
    }
    if(i===focus){ size=Math.max(size,2.3); alpha=1.0; _c.set(HOT); }
    _c.toArray(aCol,i*3); sizeT[i]=size; alphaT[i]=alpha;
  }
  pts.geometry.attributes.color.needsUpdate=true;
  updateFocusEdges();
}

// highlight the focused node's edges via the overlay mesh; dim the base mesh
function updateFocusEdges(){
  if(!focusLines) return;
  if(focus<0||!nodes[focus]){
    focusLines.visible=false;
    if(lines) lines.material.opacity=0.6;
    return;
  }
  const nb=adjacency[focus]||[], pos=focusLines.geometry.attributes.position.array;
  const fp=nodes[focus].p;
  nb.forEach((j,m)=>{ const o=m*6, np=nodes[j].p;
    pos[o]=fp[0]; pos[o+1]=fp[1]; pos[o+2]=fp[2];
    pos[o+3]=np[0]; pos[o+4]=np[1]; pos[o+5]=np[2]; });
  focusLines.geometry.setDrawRange(0, nb.length*2);
  focusLines.geometry.attributes.position.needsUpdate=true;
  focusLines.visible=true;
  if(lines) lines.material.opacity=0.14;
}

const ray=new THREE.Raycaster(); ray.params.Points.threshold=0.45;
const _m=new THREE.Vector2();
function clearFocus(){
  focus=-1; hitSet=null; hitWeights=null; lastTokens=[]; restyle();

}
cv.addEventListener('click', e=>{
  if(!pts) return;
  if(Math.hypot(e.clientX-downX, e.clientY-downY)>6) return; // orbit drag, not a click
  _m.set((e.clientX/innerWidth)*2-1, -(e.clientY/innerHeight)*2+1);
  ray.setFromCamera(_m,camera);
  const hit=ray.intersectObject(pts);
  if(focus>=0){ // selection locked: empty-space click deselects, node clicks are ignored
    if(!hit.length) clearFocus();
    return;
  }
  if(hit.length){ // nearest to camera among picks
    hit.sort((a,b)=>a.distanceToRay-b.distanceToRay);
    setFocus(hit[0].index);
  }
});

async function serverSearch(q){
  const r=await (await fetch(API+'/api/search?q='+encodeURIComponent(q)+projQ('&'))).json();
  const res=r.results||[]; const hits=new Set(); const weights=new Map(); let topIdx=-1, top=null;
  // min-max normalize within the result set — score is a rerank logit when reranked, so it can be negative
  const scores=res.map(h=>h.score||0), lo=Math.min(...scores), span=Math.max(...scores)-lo;
  res.forEach(h=>{ const i=(typeof h.graph_index==='number')?h.graph_index:idById[h.id];
    if(i!=null){ hits.add(i); weights.set(i, span>0?((h.score||0)-lo)/span:1);
      if(topIdx<0){topIdx=i; top=h;} } });
  return {hits, weights, topIdx, top, n:res.length};
}
function staticSearch(q){
  const hits=new Set(); const weights=new Map(); let topIdx=-1, best=0;
  nodes.forEach((n,i)=>{ const hay=((n.title||'')+' '+(n.source||'')+' '+(n.snippet||'')).toLowerCase();
    let s=0; lastTokens.forEach(t=>{ if(hay.includes(t)) s++; });
    if(s>0){ hits.add(i); weights.set(i,s); if(s>best){best=s;topIdx=i;} } });
  weights.forEach((s,i)=>weights.set(i, s/(best||1)));
  return {hits, weights, topIdx, top:null, n:hits.size};
}
async function runSearch(){
  const q=$('q').value.trim(); if(!q) return;
  lastTokens=tokensOf(q);
  lastLocalSearch={q, t:performance.now()};
  $('searchbar').classList.add('busy');
  try{
    const out = MODE==='static' ? staticSearch(q) : await serverSearch(q);
    hitSet=out.hits; hitWeights=out.weights||null; restyle();
    // staggered "pop" animation across the matched nodes (cascade)
    let k=0; out.hits.forEach(i=>{ popQueue.push({i, at:nowS()+ (k++)*0.035}); });
    const c=$('count'); c.textContent=out.n+' match'+(out.n===1?'':'es'); c.classList.add('show');
    if(out.topIdx>=0){
      if(MODE==='server' && out.top){ renderDetail2FromHit(out.top, out.topIdx); }
      else setFocus(out.topIdx);
    }
  }finally{ $('searchbar').classList.remove('busy'); }
}
function renderDetail2FromHit(top, idx){
  focus=idx; restyle(); targetGoal.set(...nodes[idx].p); rTarget=Math.min(rTarget,11);
  loadNodeWithMeta(top.id, {rerank_score:top.rerank_score, signals:top.signals});
}

}

// ---- search pop cascade --------------------------------------------------
const popQueue=[];
function nowS(){ return performance.now()/1000; }

// ---- live activity (SSE over /api/events, fed by pg NOTIFY) ---------------
let lastLocalSearch={q:'',t:0};
function addFeed(html, color){
  const F=$('feed'); if(!F) return;
  const el=document.createElement('div'); el.className='ev';
  if(color) el.style.borderLeftColor=color;
  el.innerHTML=html; F.appendChild(el);
  requestAnimationFrame(()=>el.classList.add('in'));
  while(F.children.length>5) F.firstChild.remove();
  setTimeout(()=>{ el.classList.add('out'); setTimeout(()=>el.remove(), 400); }, 9000);
}
function showStale(){ $('stale').style.display='block'; }
$('stale').onclick=()=>{ $('stale').style.display='none'; loadStatus(); loadGraph();
  if($('inventory').classList.contains('show')){ INV=null; loadInventory(); } };
function handleEvent(e){
  if(!e||e.type==='hello') return;
  const inScope = PROJECT==='*'||!e.project||e.project==='*'||e.project===PROJECT;
  const col = e.project&&e.project!=='*' ? projColor(e.project) : null;
  if(e.type==='search'){
    // the viewer's own searches already animate locally — skip the echo
    if(e.query===lastLocalSearch.q && (performance.now()-lastLocalSearch.t)<5000) return;
    addFeed(`⌕ <b>${esc(e.project||'?')}</b> · ${esc(e.query||'')} · ${(e.hits||[]).length} hits`, col);
    if(inScope&&e.hits){ let k=0; e.hits.forEach(h=>{ const i=idById[h.id];
      if(i!=null) popQueue.push({i, at:nowS()+(k++)*0.05}); }); }
  } else if(e.type==='ingest'){
    addFeed(`+ <b>${esc(e.project||'?')}</b> · ${esc(e.file||'')} · ${e.chunks||0} chunks`, col);
    if(inScope){ flashProject(e.project); showStale(); }
  } else if(e.type==='ingest_done'&&e.filesChanged>0){
    addFeed(`✓ <b>${esc(e.project||'?')}</b> · ${e.filesChanged} files · ${e.chunks} chunks indexed`, col);
    if(inScope) showStale();
  }
}
function connectEvents(){
  if(MODE!=='server'||typeof EventSource==='undefined') return;
  const es=new EventSource(API+'/api/events');
  es.onmessage=m=>{ try{ handleEvent(JSON.parse(m.data)); }catch(_){} };
  // EventSource reconnects on its own; nothing to do on error
}

// ---- frame loop ----------------------------------------------------------
const EASE=0.12;
function frame(){
  requestAnimationFrame(frame);
  const t=nowS();
  // ease camera
  if(AUTOSPIN && !drag) thTarget+=0.0014;
  theta+=(thTarget-theta)*EASE; phi+=(phiTarget-phi)*EASE; radius+=(rTarget-radius)*EASE;
  target.lerp(targetGoal, 0.10);
  // drain pop queue
  for(let p=popQueue.length-1;p>=0;p--){ if(t>=popQueue[p].at){ popV[popQueue[p].i]=1.0; popQueue.splice(p,1); } }
  // ease node size/alpha + pulse hits + decay pops
  if(pts){
    const N=nodes.length, sz=pts.geometry.attributes.aSize.array, al=pts.geometry.attributes.aAlpha.array;
    const hot=hitSet&&hitSet.size>0;
    for(let i=0;i<N;i++){
      let st=sizeT[i];
      if(i===focus) st+= Math.sin(t*3.2)*0.22+0.12;                 // focus heartbeat
      else if(hot&&hitSet.has(i)) st+= Math.sin(t*4.5+i)*0.16;      // match shimmer
      if(popV[i]>0.001){ st+=popV[i]*1.6; popV[i]*=0.90; }          // pop spike
      sz[i]+=(st-sz[i])*0.18; al[i]+=(alphaT[i]-al[i])*0.18;
    }
    pts.geometry.attributes.aSize.needsUpdate=true;
    pts.geometry.attributes.aAlpha.needsUpdate=true;
  }
  // project containers glow briefly when their project ingests
  for(const c of containers){
    if(c.flash>0.003){ c.flash*=0.94;
      c.mesh.material.opacity=0.045+c.flash*0.20;
      c.wire.material.opacity=0.05+c.flash*0.28; }
  }
  // focus halo follows + pulses
  if(focus>=0&&nodes[focus]){
    halo.position.set(...nodes[focus].p);
    const s=1.7+Math.sin(t*3.2)*0.22; halo.scale.setScalar(s);
    halo.material.opacity += (0.85-halo.material.opacity)*0.15;
  } else halo.material.opacity += (0-halo.material.opacity)*0.15;
  applyCam(); renderer.render(scene,camera);
}

  $('i-badges').innerHTML=
    `<span class="badge">${P.documents} docs</span>`+
    `<span class="badge">${P.chunks} chunks</span>`+
    `<span class="badge">${P.embedded} embedded</span>`+
    `<span class="badge">${esc(P.embed_model)}</span>`;
  const S=[];
  if(P.sources&&P.sources.length) S.push(`<div class="sec"><h2>sources <span class="n">${P.sources.length}</span></h2>${
    P.sources.map(s=>`<div class="row" style="cursor:default">
      <span class="dot" style="background:${s.project?projColor(s.project):UNIT_COLORS.section}"></span>
      <span class="lab"><span class="l1">${s.project?esc(s.project)+' · ':''}${esc(s.id)} · ${esc(s.type)}</span><span class="l2">${
        esc(s.path)}${s.globs&&s.globs.length?(' · '+esc(s.globs.join(' '))):''}</span></span></div>`).join('')}</div>`);
  S.push(`<div class="sec"><h2>documents <span class="n">${P.docs_total}</span></h2>${
    P.docs.map(d=>`<div class="row doc" data-doc="${d.id}">
      <span class="dot" style="background:${d.project?projColor(d.project):UNIT_COLORS.text}"></span>
      <span class="lab"><span class="l1">${esc(d.rel_path||d.title||d.id)}</span><span class="l2">${
        d.project?esc(d.project)+' · ':''}${esc(d.title||'')}${d.title?' · ':''}${d.chunks} chunks</span></span>
      <span class="op" data-open="${d.id}" title="open full document">⤢</span></div>
      <div class="kids" data-kids="${d.id}"></div>`).join('')}${
    P.docs.length<P.docs_total?`<button class="more" id="i-more">load more (${P.docs.length}/${P.docs_total})</button>`:''}</div>`);
  S.push(globalSection(inv.global||[]));
  $('i-body').innerHTML=S.join('');
  wireInventory();
}
function globalSection(list){
  return `<div class="sec"><h2>all projects <span class="n">${list.length}</span></h2>${
    list.map(p=>`<div class="row proj" data-p="${esc(p.name)}">
      <span class="dot" style="background:${p.name===PROJECT?HOT:UNIT_COLORS.definition}"></span>
      <span class="lab"><span class="l1">${esc(p.name)}</span><span class="l2">${
        p.documents} docs · ${p.chunks} chunks · ${p.embedded} embedded</span></span></div>`).join('')}</div>`;
}
function wireInventory(){
  $('i-body').querySelectorAll('.row.doc').forEach(el=>
    el.addEventListener('click',()=>expandDoc(el.getAttribute('data-doc'))));
  $('i-body').querySelectorAll('.op[data-open]').forEach(el=>
    el.addEventListener('click',e=>{ e.stopPropagation(); openDoc(el.getAttribute('data-open')); }));
  $('i-body').querySelectorAll('.row.proj').forEach(el=>
    el.addEventListener('click',()=>{
      const i=PROJECTS.findIndex(p=>p.name===el.getAttribute('data-p'));
      if(i>=0) chooseProject(i); }));
  const more=$('i-more'); if(more) more.addEventListener('click',()=>loadInventory(true));
}
async function expandDoc(id){
  const kids=document.querySelector(`[data-kids="${id}"]`); if(!kids) return;
  if(kids.innerHTML){ kids.innerHTML=''; return; } // collapse
  kids.innerHTML='<div class="loc">…</div>';
  try{
    const d=await (await fetch(API+'/api/doc?id='+encodeURIComponent(id)+projQ('&'))).json();
    if(d.error) throw 0;
    kids.innerHTML=d.chunks.map(c=>`<div class="row chunk" data-id="${c.id}">
      <span class="dot" style="background:${colorOf(c.unit_type)}"></span>
      <span class="lab"><span class="l1">${esc(c.title||('chunk '+c.ordinal))}</span><span class="l2">#${
        c.ordinal} · ${c.unit_type||'text'}${c.token_count!=null?(' · '+c.token_count+' tok'):''}${
        c.embedded?'':' · not embedded'}</span></span></div>`).join('');
    kids.querySelectorAll('.row.chunk').forEach(el=>
      el.addEventListener('click',()=>{
        const cid=el.getAttribute('data-id'), gi=idById[cid];
        if(gi!=null) setFocus(gi); else loadNode(cid); }));
  }catch(_){ kids.innerHTML='<div class="loc">failed to load chunks</div>'; }
}
function renderInventoryStatic(){
  $('i-title').textContent='data';
  $('i-badges').innerHTML='<span class="badge">static export</span>';
  $('i-body').innerHTML=globalSection((PROJECTS||[]).map(p=>({
    name:p.name,
    documents:p.documents!=null?p.documents:'?',
    chunks:p.chunks!=null?p.chunks:(p.status?p.status.doc_count:0),
    embedded:p.embedded!=null?p.embedded:'?'})));
  wireInventory();
}
$('datatoggle').onclick=toggleInventory;

// procedural offline preview (file:// or VINDEX_DEMO)
function _gauss(){ let u=0,v=0; while(!u)u=Math.random(); while(!v)v=Math.random();
  return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v); }
function makeDemoData(){
  const clusters=[
    {c:[3.2,1,.2],l:'retrieval',u:'section'},{c:[-3.4,2.1,1.1],l:'embeddings',u:'symbol'},
    {c:[.2,-3.3,2],l:'chunking',u:'code'},{c:[2.4,-1.2,-3.1],l:'memory',u:'definition'},
    {c:[-2.2,-2.1,-2],l:'grounding',u:'text'},{c:[1,3.1,2.2],l:'projects',u:'section'}];
  const nodes=[],per=44;
  clusters.forEach((cl,ci)=>{ for(let j=0;j<per;j++) nodes.push({id:'n'+ci+'_'+j,
    p:[cl.c[0]+_gauss()*1.05,cl.c[1]+_gauss()*1.05,cl.c[2]+_gauss()*1.05],
    title:cl.l+' · node '+(j+1), source:cl.l+'/'+(j+1)+'.md', unit_type:cl.u,
    snippet:'A point in the "'+cl.l+'" neighbourhood of the embedding space.', url:null}); });
  const links=[],seen={};
  for(let i=0;i<nodes.length;i++){ const d=[];
    for(let j=0;j<nodes.length;j++){ if(i===j)continue; const a=nodes[i].p,b=nodes[j].p,
      dx=a[0]-b[0],dy=a[1]-b[1],dz=a[2]-b[2]; d.push([dx*dx+dy*dy+dz*dz,j]); }
    d.sort((x,y)=>x[0]-y[0]);
    for(let m=0;m<2;m++){ const j=d[m][1],key=i<j?i+'-'+j:j+'-'+i;
      if(!seen[key]){seen[key]=1;links.push([i,j,1-d[m][0]/20]);} } }
  return {status:{name:'demo',doc_count:nodes.length,embed_model:'(procedural)',
    state:'offline preview — your real index looks like this'},graph:{nodes,links}};
}

function resize(){ const w=cv.clientWidth||innerWidth, h=cv.clientHeight||innerHeight;
  renderer.setSize(w,h,false); camera.aspect=w/h; camera.updateProjectionMatrix(); }
new ResizeObserver(resize).observe(cv); resize();

buildLegend(); frame();
if(window.VINDEX_PROJECTS && window.VINDEX_PROJECTS.length){ initStaticProjects(window.VINDEX_PROJECTS); }
else if(window.VINDEX_DATA){ bootFromData(window.VINDEX_DATA); }
else if(window.VINDEX_DEMO || location.protocol==='file:'){ AUTOSPIN=true; bootFromData(makeDemoData()); }
else { initServerProjects(); loadStatus(); loadGraph(); connectEvents(); }
</script>

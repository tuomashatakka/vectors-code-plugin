<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>vector-index · synapse viewer</title>
<style>
  :root {
    --bg:#070809; --panel:#0b0d12; --line:#1c2130; --line-2:#252b3a;
    --fg:#dde1e9; --dim:#6b7384; --faint:#3e4556;
    --accent:#6eb5e8; --hot:#e0556a;
    --u-section:#6b96e8; --u-symbol:#a87fe8; --u-definition:#6eb5e8;
    --u-code:#8ec45a; --u-text:#8899b0;
    --r:3px;
  }
  * { box-sizing:border-box; margin:0; }
  html,body { height:100%; background:var(--bg); color:var(--fg); overflow:hidden;
    font:12.5px/1.5 ui-monospace,"SF Mono",Menlo,monospace;
    -webkit-font-smoothing:antialiased; }
  canvas#c { position:fixed; inset:0; width:100%; height:100%; display:block; touch-action:none; }

  .panel { position:fixed; z-index:10; background:var(--panel);
    border:1px solid var(--line-2); border-radius:var(--r); }

  #brand { top:16px; left:16px; padding:10px 14px; }
  #brand h1 { font-size:10.5px; letter-spacing:.22em; text-transform:uppercase;
    color:var(--dim); font-weight:600; display:flex; align-items:center; gap:7px; }
  #brand h1::before { content:""; width:6px; height:6px; border-radius:50%;
    background:var(--accent); animation:beat 2.6s ease-in-out infinite; }
  #brand .meta { color:var(--faint); margin-top:5px; font-size:11px; }
  #brand .meta b { color:var(--fg); font-weight:600; }
  @keyframes beat { 0%,100%{opacity:.35} 50%{opacity:1} }

  #searchbar { top:16px; left:50%; transform:translateX(-50%);
    display:flex; gap:0; padding:4px; width:min(46ch,72vw); }
  #q { flex:1; background:transparent; border:0; color:var(--fg);
    padding:7px 11px; outline:none; font:inherit; }
  #q::placeholder { color:var(--faint); }
  #go { background:#0f1118; border:1px solid var(--line-2); color:var(--accent); border-radius:2px;
    padding:7px 14px; cursor:pointer; font:inherit; transition:background .12s,color .12s,border-color .12s; }
  #go:hover { background:var(--accent); color:var(--bg); border-color:var(--accent); }
  #searchbar.busy #go { opacity:.5; pointer-events:none; }
  #count { position:absolute; top:-22px; left:0; color:var(--dim); font-size:11px;
    opacity:0; transition:opacity .25s; }
  #count.show { opacity:1; }

  #detail { top:96px; left:16px; width:min(34ch,86vw); max-height:calc(100vh - 150px);
    display:none; flex-direction:column; overflow:hidden; opacity:0;
    transform:translateY(6px); transition:opacity .22s, transform .22s; }
  #detail.show { display:flex; opacity:1; transform:none; }
  #detail .head { padding:12px 14px 10px; border-bottom:1px solid var(--line); }
  #detail .body { padding:12px 14px; overflow-y:auto; overflow-x:hidden; }
  #detail .body::-webkit-scrollbar { width:4px; }
  #detail .body::-webkit-scrollbar-thumb { background:var(--line-2); border-radius:2px; }

  .d-title { color:var(--fg); font-weight:600; font-size:12.5px; line-height:1.35;
    word-break:break-word; }
  .badges { display:flex; flex-wrap:wrap; gap:4px; margin-top:8px; }
  .badge { font-size:10px; letter-spacing:.04em; padding:2px 7px; border-radius:2px;
    border:1px solid var(--line-2); color:var(--dim); white-space:nowrap; }
  .badge.kind { color:var(--bg); font-weight:700; border:0; }
  .badge .dot { display:inline-block; width:5px; height:5px; border-radius:50%; margin-right:5px;
    vertical-align:middle; }

  .sec { margin-top:14px; }
  .sec:first-child { margin-top:0; }
  .sec h2 { font-size:9.5px; letter-spacing:.18em; text-transform:uppercase;
    color:var(--faint); font-weight:600; margin-bottom:6px; display:flex; gap:6px; align-items:center; }
  .sec h2 .n { color:var(--dim); }

  .loc { color:var(--dim); font-size:11px; word-break:break-all; }
  .loc b { color:var(--accent); font-weight:500; }

  pre.text { white-space:pre-wrap; word-break:break-word; color:#b8bcc8; font-size:11.5px;
    line-height:1.55; max-height:200px; overflow-y:auto; padding:8px 10px; border-radius:2px;
    background:#080a0e; border:1px solid var(--line); }
  pre.text::-webkit-scrollbar { width:4px; } pre.text::-webkit-scrollbar-thumb { background:var(--line-2); }
  mark { background:transparent; color:var(--hot); border-radius:2px; padding:0 1px;
    animation:flare 1.1s ease-out; font-weight:600; }
  @keyframes flare {
    0% { background:rgba(224,85,106,.8); color:#fff; }
    100% { background:transparent; } }

  .row { display:flex; align-items:flex-start; gap:8px; padding:5px 6px; border-radius:2px;
    cursor:pointer; transition:background .1s; border:1px solid transparent; }
  .row:hover { background:rgba(110,181,232,.07); border-color:var(--line); }
  .row.self { background:rgba(224,85,106,.08); border-color:rgba(224,85,106,.22); cursor:default; }
  .row .dot { flex:none; width:6px; height:6px; border-radius:50%; margin-top:4px; }
  .row .lab { flex:1; min-width:0; }
  .row .lab .l1 { color:var(--fg); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .row .lab .l2 { color:var(--faint); font-size:10.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .row .sc { flex:none; color:var(--dim); font-size:10px; padding-top:2px; }

  .refs { display:flex; flex-direction:column; gap:4px; }
  .ref { display:flex; gap:7px; align-items:center; font-size:11px; }
  .ref .k { font-size:9px; text-transform:uppercase; letter-spacing:.06em; color:var(--faint);
    border:1px solid var(--line-2); border-radius:2px; padding:1px 5px; flex:none; }
  .ref a, .ref span.uri { color:var(--accent); word-break:break-all; text-decoration:none; }
  .ref a:hover { text-decoration:underline; }

  #legend { bottom:16px; left:16px; padding:9px 12px; display:flex; gap:12px; flex-wrap:wrap; }
  #legend .it { display:flex; align-items:center; gap:5px; color:var(--dim); font-size:10.5px; }
  #legend .it .dot { width:6px; height:6px; border-radius:50%; }

  #hint { bottom:16px; right:16px; padding:8px 12px; color:var(--faint); text-align:right;
    font-size:10.5px; max-width:40ch; }
  #hint kbd { color:var(--dim); border:1px solid var(--line-2); border-radius:2px;
    padding:0 4px; font:inherit; }

  @media (max-width:640px){ #legend,#hint{display:none} #detail{width:86vw} }
</style>
</head>
<body>
<canvas id="c"></canvas>

<aside id="brand" class="panel">
  <h1>synapse viewer</h1>
  <div class="meta" id="meta">loading…</div>
</aside>

<div id="searchbar" class="panel">
  <span id="count"></span>
  <input id="q" placeholder="semantic search…" autocomplete="off" spellcheck="false" />
  <button id="go">search</button>
</div>

<section id="detail" class="panel">
  <header class="head">
    <div class="d-title" id="d-title"></div>
    <div class="badges" id="d-badges"></div>
  </header>
  <div class="body" id="d-body"></div>
</section>

<footer id="legend" class="panel"></footer>
<div id="hint" class="panel">
  <kbd>drag</kbd> orbit · <kbd>wheel</kbd> zoom · <kbd>click</kbd> inspect ·
  <kbd>↑↓←→</kbd> traverse relations · <kbd>esc</kbd> clear
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
"use strict";
const API = location.origin;
const cv  = document.getElementById('c');

// ---- unit-type palette (shared JS + CSS) ---------------------------------
const UNIT_COLORS = {
  section:'#6b96e8', symbol:'#a87fe8', definition:'#6eb5e8',
  code:'#8ec45a', text:'#8899b0', '':'#8899b0',
};
const HOT = '#e0556a';
const colorOf = ut => UNIT_COLORS[ut] ?? UNIT_COLORS[''];

// ---- renderer / scene ----------------------------------------------------
const renderer = new THREE.WebGLRenderer({canvas:cv, antialias:true, alpha:false});
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x070809, 0.052);
const camera = new THREE.PerspectiveCamera(55, 1, 0.1, 300);

// soft round glow texture (for the focus halo sprite)
function glowTex(){
  const s=128, cvs=document.createElement('canvas'); cvs.width=cvs.height=s;
  const g=cvs.getContext('2d'); const rg=g.createRadialGradient(s/2,s/2,0,s/2,s/2,s/2);
  rg.addColorStop(0,'rgba(255,255,255,1)'); rg.addColorStop(.25,'rgba(255,255,255,.5)');
  rg.addColorStop(1,'rgba(255,255,255,0)'); g.fillStyle=rg; g.fillRect(0,0,s,s);
  const t=new THREE.CanvasTexture(cvs); t.needsUpdate=true; return t;
}
const halo = new THREE.Sprite(new THREE.SpriteMaterial({
  map:glowTex(), color:new THREE.Color(HOT), transparent:true, opacity:0,
  blending:THREE.AdditiveBlending, depthWrite:false, depthTest:false }));
halo.scale.setScalar(0); scene.add(halo);

// ---- glow-point shader (per-node size + alpha, round soft disc) ----------
const nodeMat = new THREE.ShaderMaterial({
  uniforms:{ uPx:{value:Math.min(devicePixelRatio,2)}, uScale:{value:320.0} },
  vertexColors:true, transparent:true, depthWrite:false,
  blending:THREE.AdditiveBlending,
  vertexShader:`
    attribute float aSize; attribute float aAlpha;
    varying vec3 vCol; varying float vA;
    uniform float uPx; uniform float uScale;
    void main(){
      vCol=color; vA=aAlpha;
      vec4 mv=modelViewMatrix*vec4(position,1.0);
      gl_PointSize=aSize*uScale*uPx/max(0.001,-mv.z);
      gl_Position=projectionMatrix*mv;
    }`,
  fragmentShader:`
    varying vec3 vCol; varying float vA;
    void main(){
      vec2 uv=gl_PointCoord-0.5; float d=length(uv);
      if(d>0.5) discard;
      float disc=smoothstep(0.50,0.33,d);
      float core=smoothstep(0.20,0.0,d);
      vec3 col=vCol*(0.78+0.46*core)+core*0.26;
      gl_FragColor=vec4(col, disc*vA);
    }`,
});

// ---- orbit (eased) -------------------------------------------------------
let radius=15, theta=0.6, phi=1.05;
let rTarget=15, thTarget=0.6, phiTarget=1.05;
const target=new THREE.Vector3(), targetGoal=new THREE.Vector3();
const _cp=new THREE.Vector3();
function applyCam(){
  _cp.set(target.x+radius*Math.sin(phi)*Math.cos(theta),
          target.y+radius*Math.cos(phi),
          target.z+radius*Math.sin(phi)*Math.sin(theta));
  camera.position.copy(_cp); camera.lookAt(target);
}
let drag=false, px=0, py=0;
cv.addEventListener('pointerdown', e=>{ drag=true; px=e.clientX; py=e.clientY;
  AUTOSPIN=false; cv.setPointerCapture(e.pointerId); });
cv.addEventListener('pointerup',   e=>{ drag=false; try{cv.releasePointerCapture(e.pointerId)}catch(_){}});
cv.addEventListener('pointercancel',()=>drag=false);
cv.addEventListener('pointermove', e=>{ if(!drag) return;
  thTarget -= (e.clientX-px)*0.005;
  phiTarget = Math.max(0.18, Math.min(2.96, phiTarget-(e.clientY-py)*0.005));
  px=e.clientX; py=e.clientY; });
cv.addEventListener('wheel', e=>{ e.preventDefault();
  rTarget = Math.max(3.5, Math.min(70, rTarget*(1+Math.sign(e.deltaY)*0.09))); }, {passive:false});

// ---- graph state ---------------------------------------------------------
let nodes=[], pts=null, lines=null, focus=-1, adjacency={}, idById={};
let aPos, aCol, aSize, aAlpha, sizeT, alphaT, popV, baseCol, hitSet=null;
let MODE='server', AUTOSPIN=false;
const _c = new THREE.Color();

function disposeMesh(m){ if(m){ scene.remove(m); m.geometry.dispose(); } }

function renderGraph(g){
  disposeMesh(pts); disposeMesh(lines);
  nodes=g.nodes||[]; adjacency={}; idById={}; hitSet=null; focus=-1;
  const N=nodes.length;
  aPos=new Float32Array(N*3); aCol=new Float32Array(N*3);
  aSize=new Float32Array(N); aAlpha=new Float32Array(N);
  sizeT=new Float32Array(N); alphaT=new Float32Array(N);
  popV=new Float32Array(N); baseCol=new Float32Array(N*3);
  nodes.forEach((n,i)=>{
    aPos[i*3]=n.p[0]; aPos[i*3+1]=n.p[1]; aPos[i*3+2]=n.p[2];
    _c.set(colorOf(n.unit_type)); _c.toArray(baseCol,i*3); _c.toArray(aCol,i*3);
    aSize[i]=sizeT[i]=1.0; aAlpha[i]=alphaT[i]=0.92; idById[n.id]=i;
  });
  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(aPos,3));
  geo.setAttribute('color',    new THREE.BufferAttribute(aCol,3));
  geo.setAttribute('aSize',    new THREE.BufferAttribute(aSize,1));
  geo.setAttribute('aAlpha',   new THREE.BufferAttribute(aAlpha,1));
  pts=new THREE.Points(geo, nodeMat); pts.frustumCulled=false; scene.add(pts);

  // links — vertex colors fade by similarity weight
  const lp=[], lc=[];
  (g.links||[]).forEach(([a,b,w])=>{
    if(a>=N||b>=N) return;
    (adjacency[a]=adjacency[a]||[]).push(b); (adjacency[b]=adjacency[b]||[]).push(a);
    const wn=Math.max(0.12, Math.min(1,(w||0.4)));
    for(const k of [a,b]){
      lp.push(nodes[k].p[0],nodes[k].p[1],nodes[k].p[2]);
      _c.set(colorOf(nodes[k].unit_type)).multiplyScalar(0.34*wn+0.06);
      lc.push(_c.r,_c.g,_c.b);
    }
  });
  const lgeo=new THREE.BufferGeometry();
  lgeo.setAttribute('position', new THREE.Float32BufferAttribute(lp,3));
  lgeo.setAttribute('color',    new THREE.Float32BufferAttribute(lc,3));
  lines=new THREE.LineSegments(lgeo, new THREE.LineBasicMaterial(
    {vertexColors:true, transparent:true, opacity:0.6, depthWrite:false,
     blending:THREE.AdditiveBlending}));
  lines.frustumCulled=false; scene.add(lines);
  restyle();
}

// compute per-node style targets from focus + search hits
function restyle(){
  if(!pts) return;
  const N=nodes.length, hot=hitSet && hitSet.size>0;
  for(let i=0;i<N;i++){
    let size=1.0, alpha=0.92; _c.fromArray(baseCol,i*3);
    if(hot){
      if(hitSet.has(i)){ size=1.9; alpha=1.0; _c.lerp(new THREE.Color(1,1,1),0.18); }
      else { size=0.72; alpha=0.20; _c.multiplyScalar(0.6); }
    }
    if(i===focus){ size=Math.max(size,2.3); alpha=1.0; _c.set(HOT); }
    _c.toArray(aCol,i*3); sizeT[i]=size; alphaT[i]=alpha;
  }
  pts.geometry.attributes.color.needsUpdate=true;
}

// ---- detail panel --------------------------------------------------------
const $=id=>document.getElementById(id);
let lastTokens=[];
function tokensOf(q){ return (q||'').toLowerCase().split(/\s+/).filter(t=>t.length>1); }
function esc(s){ return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function hl(s){
  let h=esc(s); if(!lastTokens.length) return h;
  const re=new RegExp('('+lastTokens.map(t=>t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')).join('|')+')','gi');
  return h.replace(re,'<mark>$1</mark>');
}
function kindBadge(ut){
  const col=colorOf(ut);
  return `<span class="badge kind" style="background:${col}">${ut||'text'}</span>`;
}
function row(n){
  const col=colorOf(n.unit_type);
  const sc = n.score!=null ? `<span class="sc">${(n.score).toFixed(2)}</span>` : '';
  const cls = n.self ? 'row self' : 'row';
  const data = n.self ? '' : `data-id="${n.id}"${n.graph_index!=null?` data-gi="${n.graph_index}"`:''}`;
  const l1 = n.chunk!=null && n.self===undefined ? n.title : (n.title||n.source);
  const sub = n.self!==undefined ? `chunk ${n.chunk} · ${n.unit_type||'text'}`
                                 : `${n.source}${n.chunk?(' · #'+n.chunk):''}`;
  return `<div class="${cls}" ${data}>
    <span class="dot" style="background:${col}"></span>
    <span class="lab"><span class="l1">${hl(l1||'')}</span><span class="l2">${esc(sub)}</span></span>
    ${sc}</div>`;
}
function renderDetail(d, extra){
  extra=extra||{};
  $('detail').classList.add('show');
  $('d-title').innerHTML=hl(d.title||d.source||'');
  // badges
  const b=[];
  b.push(kindBadge(d.unit_type));
  if(d.symbol) b.push(`<span class="badge">◆ ${esc(d.symbol)}</span>`);
  if(d.char_count!=null) b.push(`<span class="badge">${d.char_count} chars</span>`);
  if(extra.rerank_score!=null) b.push(`<span class="badge">rerank ${(+extra.rerank_score).toFixed(2)}</span>`);
  if(extra.signals) b.push(`<span class="badge">${extra.signals.join('+')}</span>`);
  $('d-badges').innerHTML=b.join('');
  // body
  const S=[];
  S.push(`<div class="sec"><h2>location</h2>
    <div class="loc"><b>${esc(d.source||'?')}</b> · chunk ${d.chunk??0}${
      d.source_id?(' · src:'+esc(d.source_id)):''}</div></div>`);
  if(d.url) S.push(`<div class="sec"><h2>url</h2><div class="refs"><div class="ref">
    <a href="${esc(d.url)}" target="_blank" rel="noopener">${esc(d.url)}</a></div></div></div>`);
  if(d.text) S.push(`<div class="sec"><h2>content</h2><pre class="text">${hl(d.text)}</pre></div>`);
  if(d.references&&d.references.length) S.push(`<div class="sec">
    <h2>references <span class="n">${d.references.length}</span></h2><div class="refs">${
      d.references.map(r=>`<div class="ref"><span class="k">${esc(r.kind)}</span>${
        r.kind==='url'?`<a href="${esc(r.uri)}" target="_blank" rel="noopener">${esc(r.uri)}</a>`
                      :`<span class="uri">${esc(r.uri)}</span>`}</div>`).join('')}</div></div>`);
  if(d.relations&&d.relations.length) S.push(`<div class="sec">
    <h2>relations <span class="n">${d.relations.length}</span></h2>${
      d.relations.map(row).join('')}</div>`);
  if(d.document&&d.document.length>1) S.push(`<div class="sec">
    <h2>document <span class="n">${d.document.length} chunks</span></h2>${
      d.document.map(c=>row(Object.assign({}, c))).join('')}</div>`);
  $('d-body').innerHTML=S.join('');
  // wire clickable rows
  $('d-body').querySelectorAll('.row[data-id]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const gi=el.getAttribute('data-gi');
      if(gi!=null) setFocus(+gi); else loadNode(el.getAttribute('data-id'));
    });
  });
}

async function loadNode(id){
  if(MODE!=='server'){ const i=idById[id]; if(i!=null) setFocus(i); return; }
  try{
    const d=await (await fetch(API+'/api/node?id='+encodeURIComponent(id))).json();
    if(d&&!d.error){ renderDetail(d); const i=idById[id]; if(i!=null) setFocus(i,true); }
  }catch(_){}
}
function setFocus(i, skipLoad){
  if(i==null||i<0||!nodes[i]) return;
  focus=i; restyle();
  targetGoal.set(...nodes[i].p);
  rTarget=Math.min(rTarget, 11);
  if(!skipLoad){
    if(MODE==='server'){ loadNode(nodes[i].id); }
    else { renderDetail(Object.assign({char_count:(nodes[i].snippet||'').length}, nodes[i],
      {text:nodes[i].snippet})); }
  }
}

// ---- picking -------------------------------------------------------------
const ray=new THREE.Raycaster(); ray.params.Points.threshold=0.45;
const _m=new THREE.Vector2();
cv.addEventListener('click', e=>{
  if(!pts) return;
  _m.set((e.clientX/innerWidth)*2-1, -(e.clientY/innerHeight)*2+1);
  ray.setFromCamera(_m,camera);
  const hit=ray.intersectObject(pts);
  if(hit.length){ // nearest to camera among picks
    hit.sort((a,b)=>a.distanceToRay-b.distanceToRay);
    setFocus(hit[0].index);
  }
});
addEventListener('keydown', e=>{
  if(document.activeElement===$('q')) return;
  if(e.key==='Escape'){ focus=-1; hitSet=null; lastTokens=[]; restyle();
    $('detail').classList.remove('show'); $('count').classList.remove('show'); return; }
  const nb=adjacency[focus]||[];
  if(['ArrowRight','ArrowDown'].includes(e.key)&&nb.length) setFocus(nb[(nb._i=((nb._i||0)+1)%nb.length)]);
  if(['ArrowLeft','ArrowUp'].includes(e.key)&&nb.length)  setFocus(nb[(nb._i=((nb._i||0)-1+nb.length)%nb.length)]);
});

// ---- search --------------------------------------------------------------
async function serverSearch(q){
  const r=await (await fetch(API+'/api/search?q='+encodeURIComponent(q))).json();
  const res=r.results||[]; const hits=new Set(); let topIdx=-1, top=null;
  res.forEach(h=>{ const i=(typeof h.graph_index==='number')?h.graph_index:idById[h.id];
    if(i!=null){ hits.add(i); if(topIdx<0){topIdx=i; top=h;} } });
  return {hits, topIdx, top, n:res.length};
}
function staticSearch(q){
  const hits=new Set(); let topIdx=-1, best=0;
  nodes.forEach((n,i)=>{ const hay=((n.title||'')+' '+(n.source||'')+' '+(n.snippet||'')).toLowerCase();
    let s=0; lastTokens.forEach(t=>{ if(hay.includes(t)) s++; });
    if(s>0){ hits.add(i); if(s>best){best=s;topIdx=i;} } });
  return {hits, topIdx, top:null, n:hits.size};
}
async function runSearch(){
  const q=$('q').value.trim(); if(!q) return;
  lastTokens=tokensOf(q);
  $('searchbar').classList.add('busy');
  try{
    const out = MODE==='static' ? staticSearch(q) : await serverSearch(q);
    hitSet=out.hits; restyle();
    // staggered "pop" animation across the matched nodes (cascade)
    let k=0; out.hits.forEach(i=>{ popQueue.push({i, at:nowS()+ (k++)*0.035}); });
    const c=$('count'); c.textContent=out.n+' match'+(out.n===1?'':'es'); c.classList.add('show');
    if(out.topIdx>=0){
      if(MODE==='server' && out.top){ renderDetail2FromHit(out.top, out.topIdx); }
      else setFocus(out.topIdx);
    }
  }finally{ $('searchbar').classList.remove('busy'); }
}
function renderDetail2FromHit(top, idx){
  focus=idx; restyle(); targetGoal.set(...nodes[idx].p); rTarget=Math.min(rTarget,11);
  loadNodeWithMeta(top.id, {rerank_score:top.rerank_score, signals:top.signals});
}
async function loadNodeWithMeta(id, extra){
  try{ const d=await (await fetch(API+'/api/node?id='+encodeURIComponent(id))).json();
    if(d&&!d.error) renderDetail(d, extra); }catch(_){}
}
$('go').onclick=runSearch;
$('q').addEventListener('keydown',e=>{ if(e.key==='Enter') runSearch(); });

// ---- search pop cascade --------------------------------------------------
const popQueue=[];
function nowS(){ return performance.now()/1000; }

// ---- frame loop ----------------------------------------------------------
const EASE=0.12;
function frame(){
  requestAnimationFrame(frame);
  const t=nowS();
  // ease camera
  if(AUTOSPIN && !drag) thTarget+=0.0014;
  theta+=(thTarget-theta)*EASE; phi+=(phiTarget-phi)*EASE; radius+=(rTarget-radius)*EASE;
  target.lerp(targetGoal, 0.10);
  // drain pop queue
  for(let p=popQueue.length-1;p>=0;p--){ if(t>=popQueue[p].at){ popV[popQueue[p].i]=1.0; popQueue.splice(p,1); } }
  // ease node size/alpha + pulse hits + decay pops
  if(pts){
    const N=nodes.length, sz=pts.geometry.attributes.aSize.array, al=pts.geometry.attributes.aAlpha.array;
    const hot=hitSet&&hitSet.size>0;
    for(let i=0;i<N;i++){
      let st=sizeT[i];
      if(i===focus) st+= Math.sin(t*3.2)*0.22+0.12;                 // focus heartbeat
      else if(hot&&hitSet.has(i)) st+= Math.sin(t*4.5+i)*0.16;      // match shimmer
      if(popV[i]>0.001){ st+=popV[i]*1.6; popV[i]*=0.90; }          // pop spike
      sz[i]+=(st-sz[i])*0.18; al[i]+=(alphaT[i]-al[i])*0.18;
    }
    pts.geometry.attributes.aSize.needsUpdate=true;
    pts.geometry.attributes.aAlpha.needsUpdate=true;
  }
  // focus halo follows + pulses
  if(focus>=0&&nodes[focus]){
    halo.position.set(...nodes[focus].p);
    const s=1.7+Math.sin(t*3.2)*0.22; halo.scale.setScalar(s);
    halo.material.opacity += (0.85-halo.material.opacity)*0.15;
  } else halo.material.opacity += (0-halo.material.opacity)*0.15;
  applyCam(); renderer.render(scene,camera);
}

// ---- meta + legend -------------------------------------------------------
function setMeta(s){ $('meta').innerHTML=
  `<b>${s.name}</b> · ${s.doc_count} chunks<br>${s.embed_model} · ${s.state}`; }
function buildLegend(){
  $('legend').innerHTML=Object.entries({section:'section',symbol:'symbol',
    definition:'definition',code:'code',text:'text'}).map(([k,l])=>
    `<span class="it"><span class="dot" style="background:${UNIT_COLORS[k]}"></span>${l}</span>`
  ).join('')+`<span class="it"><span class="dot" style="background:${HOT}"></span>selected</span>`;
}

// ---- boot ----------------------------------------------------------------
function bootFromData(data){ MODE='static'; setMeta(data.status); renderGraph(data.graph); }
async function loadStatus(){ setMeta(await (await fetch(API+'/api/status')).json()); }
async function loadGraph(){ renderGraph(await (await fetch(API+'/api/graph?n=600&k=3')).json()); }

// procedural offline preview (file:// or VINDEX_DEMO)
function _gauss(){ let u=0,v=0; while(!u)u=Math.random(); while(!v)v=Math.random();
  return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v); }
function makeDemoData(){
  const clusters=[
    {c:[3.2,1,.2],l:'retrieval',u:'section'},{c:[-3.4,2.1,1.1],l:'embeddings',u:'symbol'},
    {c:[.2,-3.3,2],l:'chunking',u:'code'},{c:[2.4,-1.2,-3.1],l:'memory',u:'definition'},
    {c:[-2.2,-2.1,-2],l:'grounding',u:'text'},{c:[1,3.1,2.2],l:'projects',u:'section'}];
  const nodes=[],per=44;
  clusters.forEach((cl,ci)=>{ for(let j=0;j<per;j++) nodes.push({id:'n'+ci+'_'+j,
    p:[cl.c[0]+_gauss()*1.05,cl.c[1]+_gauss()*1.05,cl.c[2]+_gauss()*1.05],
    title:cl.l+' · node '+(j+1), source:cl.l+'/'+(j+1)+'.md', unit_type:cl.u,
    snippet:'A point in the "'+cl.l+'" neighbourhood of the embedding space.', url:null}); });
  const links=[],seen={};
  for(let i=0;i<nodes.length;i++){ const d=[];
    for(let j=0;j<nodes.length;j++){ if(i===j)continue; const a=nodes[i].p,b=nodes[j].p,
      dx=a[0]-b[0],dy=a[1]-b[1],dz=a[2]-b[2]; d.push([dx*dx+dy*dy+dz*dz,j]); }
    d.sort((x,y)=>x[0]-y[0]);
    for(let m=0;m<2;m++){ const j=d[m][1],key=i<j?i+'-'+j:j+'-'+i;
      if(!seen[key]){seen[key]=1;links.push([i,j,1-d[m][0]/20]);} } }
  return {status:{name:'demo',doc_count:nodes.length,embed_model:'(procedural)',
    state:'offline preview — your real index looks like this'},graph:{nodes,links}};
}

function resize(){ const w=cv.clientWidth||innerWidth, h=cv.clientHeight||innerHeight;
  renderer.setSize(w,h,false); camera.aspect=w/h; camera.updateProjectionMatrix(); }
new ResizeObserver(resize).observe(cv); resize();

buildLegend(); frame();
if(window.VINDEX_DATA){ bootFromData(window.VINDEX_DATA); }
else if(window.VINDEX_DEMO || location.protocol==='file:'){ AUTOSPIN=true; bootFromData(makeDemoData()); }
else { loadStatus(); loadGraph(); }
</script>
